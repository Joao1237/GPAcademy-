<!DOCTYPE html>
<html lang="pt-br">

<head>

    <!-- Configurações básicas -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard do Aluno</title>

    <!-- CSS da tela -->
    <link rel="stylesheet" href="../CSS/dashboard-aluno.css">
    <link rel="stylesheet" href="../CSS/responsive.css">

</head>

<body>

    <!-- CABEÇALHO -->
    <header class="header">

        <!-- Logo do sistema -->
        <div class="logo">
            GPAcademy
        </div>

        <!-- Menu de navegação -->
        <nav class="menu">
            <a href="#">
                Projetos
            </a>
        </nav>

        <button type="button" class="menu-toggle" onclick="toggleMenu()" aria-label="Abrir menu" aria-expanded="false">
            <span class="menu-toggle-bar"></span>
            <span class="menu-toggle-bar"></span>
            <span class="menu-toggle-bar"></span>
        </button>


        <!-- Área do usuário -->
        <div class="icons">

            <!-- Área de notificações -->
            <div class="notification-area">

                <button class="notification-btn" onclick="abrirNotificacoes()">

                    🔔

                    <span class="notification-count">0</span>

                </button>

                <div class="notification-box" id="notificationBox">
                    <h3>Notificações</h3>
                </div>

            </div>

            <!-- Informações do usuário -->
            <div class="user-box">

                <div class="user-avatar">
                    👤
                </div>

                <div class="user-info">

                    <strong id="nomeUsuario">
                        Usuário
                    </strong>

                    <span id="tipoUsuario">
                        Aluno
                    </span>

                </div>

            </div>

            <!-- Botão de logout -->
            <button onclick="logout()" class="logout-btn">

                ⏻

            </button>

        </div>

    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="container">

        <!-- Título da página -->
        <h1 class="title">
            Meus Projetos Acadêmicos
        </h1>

        <!-- Cards dos projetos carregados pelo JavaScript -->
        <div class="cards"></div>

    </main>

    <!-- MODAL DE LOGOUT -->
    <div class="logout-modal" id="logoutModal">

        <div class="modal-box">

            <div class="modal-icon">
                ⏻
            </div>

            <h2>
                Encerrar Sessão
            </h2>

            <p>
                Deseja realmente encerrar sua sessão no GPAcademy?
            </p>

            <div class="modal-buttons">

                <button onclick="confirmarLogout()" class="btn-danger">

                    Sim, sair

                </button>

                <button onclick="fecharModal()" class="btn-cancel">

                    Cancelar

                </button>

            </div>

        </div>

    </div>

    <!-- JavaScript da tela -->
    <script src="../js/config.js"></script>
    <script src="../js/responsive.js"></script>
    <script src="../js/notificacoes.js"></script>
    <script src="../js/dashboard-aluno.js"></script>

</body>

</html>
