<!DOCTYPE html>
<html lang="pt-br">

<head>

    <!-- Configurações básicas -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Editar Usuário</title>

    <!-- CSS da tela -->
    <link rel="stylesheet" href="../CSS/editar-usuario-admin.css">
    <link rel="stylesheet" href="../CSS/responsive.css">

</head>

<body>

    <!-- CABEÇALHO -->
    <header class="header">

        <!-- Logo do sistema -->
        <div class="logo">
            GPAcademy
        </div>

        <!-- Menu do administrador -->
        <nav class="menu">

            <a href="dashboard-admin.html" class="active">
                Usuários
            </a>

            <a href="gestao-projetos-admin.html">
                Projetos
            </a>

        </nav>

        <button type="button" class="menu-toggle" onclick="toggleMenu()" aria-label="Abrir menu" aria-expanded="false">
            <span class="menu-toggle-bar"></span>
            <span class="menu-toggle-bar"></span>
            <span class="menu-toggle-bar"></span>
        </button>


        <!-- Área do usuário -->
        <div class="icons">

            <div class="user-box">

                <div class="user-avatar">
                    👤
                </div>

                <div class="user-info">
                    <strong>Usuário</strong>
                    <span>Administrador</span>
                </div>

            </div>

            <!-- Botão de logout -->
            <button onclick="logout()" class="logout-btn">
                ⏻
            </button>

        </div>

    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="container">

        <!-- Botão voltar -->
        <button onclick="voltar()" class="back-btn">
            ← Voltar
        </button>

        <p class="mini-title">
            ADMINISTRAÇÃO | EDIÇÃO
        </p>

        <h1 class="title">
            Editar Usuário
        </h1>

        <!-- FORMULÁRIO DE EDIÇÃO -->
        <section class="form-box">

            <!-- Nome -->
            <div class="input-group">

                <label>
                    Nome Completo
                </label>

                <input type="text" id="nome" placeholder="Digite o nome completo">

            </div>

            <!-- Email -->
            <div class="input-group">

                <label>
                    E-mail Institucional
                </label>

                <input type="email" id="email" placeholder="Digite o e-mail">

            </div>

            <!-- Perfil e curso -->
            <div class="grid">

                <div class="input-group">

                    <label>
                        Perfil
                    </label>

                    <!-- Perfil fica bloqueado para evitar trocar o tipo do usuário -->
                    <select id="perfil" disabled>
                        <option value="ALUNO">Aluno</option>
                        <option value="PROFESSOR">Professor</option>
                        <option value="ADMINISTRADOR">Administrador</option>
                    </select>

                </div>

                <div class="input-group">

                    <label>
                        Curso
                    </label>

                    <!-- Cursos são carregados pelo JavaScript -->
                    <select id="curso">
                        <option value="">
                            Carregando cursos...
                        </option>
                    </select>

                </div>

            </div>

            <!-- Período e senha -->
            <div class="grid">

                <div class="input-group">

                    <label>
                        Período
                    </label>

                    <!-- Períodos são gerados pelo JavaScript -->
                    <select id="periodo">
                        <option value="">
                            Selecione o período
                        </option>
                    </select>

                </div>

                <div class="input-group">

                    <label>
                        Nova Senha
                    </label>

                    <input type="password" id="senha" placeholder="Deixe em branco para manter a senha atual">

                </div>

            </div>

            <!-- Status visual do usuário -->
            <div class="switch-area">

                <label class="switch">

                    <input type="checkbox" checked id="status">

                    <span class="slider"></span>

                </label>

                <p>
                    Usuário Ativo
                </p>

            </div>

            <!-- Botões -->
            <div class="buttons">

                <button onclick="voltar()" class="btn-secondary">
                    Cancelar
                </button>

                <button onclick="salvar()" class="btn-primary">
                    Salvar Alterações
                </button>

            </div>

        </section>

    </main>

    <!-- MODAL DE LOGOUT -->
    <div class="logout-modal" id="logoutModal">

        <div class="modal-box">

            <div class="modal-icon">
                ⏻
            </div>

            <h2>
                Encerrar Sessão
            </h2>

            <p>
                Deseja realmente encerrar sua sessão no GPAcademy?
            </p>

            <div class="modal-buttons">

                <button onclick="confirmarLogout()" class="btn-danger">
                    Sim, sair
                </button>

                <button onclick="fecharModal()" class="btn-cancel">
                    Cancelar
                </button>

            </div>

        </div>

    </div>
    <!-- MODAL DE SUCESSO -->
    <div class="success-modal" id="successModal">

        <div class="modal-box">

            <div class="modal-icon success-icon">
                ✓
            </div>

            <h2>Usuário atualizado!</h2>

            <p>
                As informações do usuário foram salvas com sucesso.
            </p>

            <button onclick="fecharSucesso()" class="btn-primary btn-success">
            Voltar ao painel
        </button>

        </div>

    </div>
    <!-- JavaScript da tela -->

    <script src="../js/config.js"></script>
    <script src="../js/responsive.js"></script>
    <script src="../js/editar-usuario-admin.js"></script>

</body>

</html>
