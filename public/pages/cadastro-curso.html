<!DOCTYPE html>
<html lang="pt-br">

<head>

    <!-- Configurações básicas -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Cadastrar Curso
    </title>

    <!-- CSS da tela -->
    <link rel="stylesheet" href="../CSS/cadastro-curso.css">
    <link rel="stylesheet" href="../CSS/responsive.css">

</head>

<body>

    <!-- CABEÇALHO -->
    <header class="header">

        <!-- Logo -->
        <div class="logo">
            GPAcademy
        </div>

        <!-- Menu -->
        <nav class="menu">

            <a href="#">
                Usuários
            </a>

            <a href="#">
                Projetos
            </a>

        </nav>

        <button type="button" class="menu-toggle" onclick="toggleMenu()" aria-label="Abrir menu" aria-expanded="false">
            <span class="menu-toggle-bar"></span>
            <span class="menu-toggle-bar"></span>
            <span class="menu-toggle-bar"></span>
        </button>


        <!-- Área do usuário -->
        <div class="user-area">

            <div class="user-box">

                <div class="avatar">
                    👤
                </div>

                <div class="user-info">

                    <strong>
                        Usuário
                    </strong>

                    <span>
                        Administrador
                    </span>

                </div>

            </div>

            <!-- Botão logout -->
            <button onclick="logout()" class="logout-btn">

                ⏻

            </button>

        </div>

    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="container">

        <!-- Botão voltar -->
        <button onclick="voltar()" class="back-btn">

            ← Voltar

        </button>

        <!-- Identificação da página -->
        <p class="mini-title">
            ADMINISTRAÇÃO | CURSOS
        </p>

        <h1 class="title">
            Cadastrar Curso
        </h1>

        <!-- FORMULÁRIO -->
        <section class="form-box">

            <!-- Nome do curso -->
            <div class="input-group">

                <label>
                    Nome do Curso
                </label>

                <input type="text" id="nomeCurso" placeholder="Ex: ADS">

            </div>

            <!-- Quantidade de períodos -->
            <div class="input-group">

                <label>
                    Quantidade de Períodos
                </label>

                <input type="number" id="quantidadePeriodos" placeholder="Ex: 4">

            </div>

            <!-- Mensagem de erro -->
            <p id="erro" class="erro-msg">
            </p>

            <!-- Botões -->
            <div class="buttons">

                <button onclick="voltar()" class="btn-cancel">

                    Cancelar

                </button>

                <button onclick="cadastrarCurso()" class="btn-primary">

                    Cadastrar Curso

                </button>

            </div>

        </section>

    </main>

    <!-- MODAL DE SUCESSO -->
    <div class="success-modal" id="successModal">

        <div class="modal-box">

            <h2>
                Curso cadastrado!
            </h2>

            <p>
                O curso foi cadastrado com sucesso.
            </p>

            <button onclick="fecharModal()" class="btn-primary">

                Voltar

            </button>

        </div>

    </div>

    <!-- JavaScript da tela -->    <script src="../js/config.js"></script>
    <script src="../js/responsive.js"></script>
    <script src="../js/cadastro-curso.js"></script>

</body>

</html>
