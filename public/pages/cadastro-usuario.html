<!DOCTYPE html>
<html lang="pt-br">

<head>

    <!-- Configurações básicas da página -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro de Usuário</title>

    <!-- CSS da tela -->
    <link rel="stylesheet" href="../CSS/cadastro-usuario.css">
    <link rel="stylesheet" href="../CSS/responsive.css">

</head>

<body>

    <!-- CABEÇALHO -->
    <header class="header">

        <!-- Logo do sistema -->
        <div class="logo">
            GPAcademy
        </div>

        <!-- Menu -->
        <nav class="menu">
            <a href="dashboard-admin.html">
                Administração
            </a>
        </nav>

        <button type="button" class="menu-toggle" onclick="toggleMenu()" aria-label="Abrir menu" aria-expanded="false">
            <span class="menu-toggle-bar"></span>
            <span class="menu-toggle-bar"></span>
            <span class="menu-toggle-bar"></span>
        </button>


        <!-- Informações do usuário -->
        <div class="icons">

            <div class="user-box">

                <div class="user-avatar">
                    👤
                </div>

                <div class="user-info">
                    <strong>Usuário</strong>
                    <span>Administrador</span>
                </div>

            </div>

            <!-- Botão logout -->
            <button onclick="logout()" class="logout-btn">

                ⏻

            </button>

        </div>

    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="container">

        <!-- Botão voltar -->
        <button onclick="voltar()" class="back-btn">

            ← Voltar

        </button>

        <!-- Identificação da tela -->
        <p class="mini-title">
            ADMINISTRAÇÃO | CADASTRO
        </p>

        <h1 class="title">
            Cadastrar Usuário
        </h1>

        <!-- FORMULÁRIO -->
        <section class="form-box">

            <!-- Nome -->
            <div class="input-group">

                <label>
                    Nome completo
                </label>

                <input type="text" id="nome" placeholder="Digite o nome completo">

            </div>

            <!-- E-mail -->
            <div class="input-group">

                <label>
                    E-mail institucional
                </label>

                <input type="email" id="email" placeholder="nome@faculdade.edu.br">

            </div>

            <!-- Perfil e senha -->
            <div class="grid">

                <div class="input-group">

                    <label>
                        Perfil
                    </label>

                    <select id="perfil" onchange="alterarPerfil()">

                        <option value="">
                            Selecione o perfil
                        </option>

                        <option>
                            Administrador
                        </option>

                        <option>
                            Aluno
                        </option>

                        <option>
                            Professor
                        </option>

                    </select>

                </div>

                <div class="input-group">

                    <label>
                        Senha
                    </label>

                    <input type="password" id="senha" placeholder="Digite a senha inicial">

                </div>

            </div>

            <!-- ÁREA EXCLUSIVA PARA ALUNOS -->
            <div class="grid" id="areaAluno">

                <div class="input-group">

                    <label>
                        Curso vinculado
                    </label>

                    <select id="curso">
                        <option value="">
                            Carregando cursos...
                        </option>
                    </select>

                </div>

                <div class="input-group">

                    <label>
                        Período vinculado
                    </label>

                    <select id="periodo">
                        <option value="">
                            Selecione um curso primeiro
                        </option>
                    </select>

                </div>

            </div>

            <!-- ÁREA EXCLUSIVA PARA PROFESSORES -->
            <div class="input-group" id="areaProfessor" style="display: none;">

                <label>
                    Vínculos do Professor
                </label>

                <div class="grid vinculos-grid">

                    <div class="input-group vinculo-field">

                        <label>
                            Curso
                        </label>

                        <select id="cursoProfessor">
                            <option value="">
                                Carregando cursos...
                            </option>
                        </select>

                    </div>

                    <div class="input-group vinculo-field">

                        <label>
                            Período
                        </label>

                        <select id="periodoProfessor">
                            <option value="">
                                Selecione um curso primeiro
                            </option>
                        </select>

                    </div>

                </div>

                <button type="button" onclick="adicionarVinculoProfessor()" class="btn-secondary btn-add-vinculo">

                    Adicionar vínculo

                </button>

                <div id="listaVinculosProfessor" class="lista-vinculos"></div>

            </div>

            <!-- BOTÕES DE AÇÃO -->
            <div class="buttons">

                <button onclick="voltar()" class="btn-secondary">

                    Cancelar

                </button>

                <button onclick="cadastrarUsuario()" class="btn-primary">

                    Cadastrar Usuário

                </button>

            </div>

        </section>

    </main>

    <!-- MODAL DE LOGOUT -->
    <div class="logout-modal" id="logoutModal">

        <div class="modal-box">

            <div class="modal-icon">
                ⏻
            </div>

            <h2>
                Encerrar Sessão
            </h2>

            <p>
                Deseja realmente encerrar sua sessão no GPAcademy?
            </p>

            <div class="modal-buttons">

                <button onclick="confirmarLogout()" class="btn-danger">

                    Sim, sair

                </button>

                <button onclick="fecharModal()" class="btn-cancel">

                    Cancelar

                </button>

            </div>

        </div>

    </div>

    <!-- MODAL DE SUCESSO -->
    <div class="success-modal" id="successModal">

        <div class="modal-box">

            <div class="modal-icon success-icon">
                ✓
            </div>

            <h2>
                Usuário cadastrado!
            </h2>

            <p>
                O usuário foi cadastrado com sucesso no GPAcademy.
            </p>

            <button onclick="fecharSucesso()" class="btn-primary">

                Voltar ao painel

            </button>

        </div>

    </div>

    <!-- JavaScript da tela -->    <script src="../js/config.js"></script>
    <script src="../js/responsive.js"></script>
    <script src="../js/cadastro-usuario.js"></script>

</body>

</html>
