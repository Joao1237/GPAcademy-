<!DOCTYPE html>
<html lang="pt-br">

<head>

    <!-- Configurações básicas -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Lista de Entregas</title>

    <!-- CSS da tela -->
    <link rel="stylesheet" href="../CSS/lista-entregas-professor.css">
    <link rel="stylesheet" href="../CSS/responsive.css">

</head>

<body>

    <!-- CABEÇALHO -->
    <header class="header">

        <div class="logo">
            GPAcademy
        </div>

        <nav class="menu">
            <a href="dashboard-professor.html">
                Projetos
            </a>
        </nav>

        <button type="button" class="menu-toggle" onclick="toggleMenu()" aria-label="Abrir menu" aria-expanded="false">
            <span class="menu-toggle-bar"></span>
            <span class="menu-toggle-bar"></span>
            <span class="menu-toggle-bar"></span>
        </button>


        <div class="icons">

            <!-- Notificações -->
            <div class="notification-area">

                <button class="notification-btn" onclick="abrirNotificacoes()">
                    🔔
                    <span class="notification-count">0</span>
                </button>

                <div class="notification-box" id="notificationBox">
                    <h3>Notificações</h3>
                </div>

            </div>

            <!-- Usuário logado -->
            <div class="user-box">

                <div class="user-avatar">
                    👤
                </div>

                <div class="user-info">
                    <strong id="nomeUsuario">Usuário</strong>
                    <span id="tipoUsuario">Professor</span>
                </div>

            </div>

            <button onclick="logout()" class="logout-btn">
                ⏻
            </button>

        </div>

    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="container">

        <button onclick="voltar()" class="back-btn">
            ← Voltar
        </button>

        <p class="mini-title">
            ENTREGAS | PROJETOS ACADÊMICOS
        </p>

        <h1 class="title">
            Lista de Entregas
        </h1>

        <!-- Tabela preenchida pelo JavaScript -->
        <section class="table-box">

            <div class="table-header">
                <h2 id="tituloTabela">Entregas</h2>
            </div>

            <div class="table-wrapper">
                <table>
                <thead id="theadEntregas"></thead>
                <tbody id="tbodyEntregas"></tbody>
                </table>
            </div>

        </section>

    </main>

    <!-- MODAL DE LOGOUT -->
    <div class="logout-modal" id="logoutModal">

        <div class="modal-box">

            <div class="modal-icon">
                ⏻
            </div>

            <h2>Encerrar Sessão</h2>

            <p>
                Deseja realmente encerrar sua sessão no GPAcademy?
            </p>

            <div class="modal-buttons">

                <button onclick="confirmarLogout()" class="btn-danger">
                    Sim, sair
                </button>

                <button onclick="fecharModal()" class="btn-cancel">
                    Cancelar
                </button>

            </div>

        </div>

    </div>

    <script src="../js/config.js"></script>
    <script src="../js/responsive.js"></script>
    <script src="../js/notificacoes.js"></script>
    <script src="../js/lista-entregas-professor.js"></script>

</body>

</html>
