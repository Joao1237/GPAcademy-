<!DOCTYPE html>
<html lang="pt-br">

<head>

    <!-- Configurações básicas -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Login - GPAcademy
    </title>

    <!-- CSS da tela -->
    <link rel="stylesheet" href="../CSS/login.css">
    <link rel="stylesheet" href="../CSS/responsive.css">

</head>

<body>

    <!-- Página de Login -->
    <section class="login-page">

        <div class="login-container">

            <!-- Ícone do sistema -->
            <div class="login-icon">
                🎓
            </div>

            <!-- Nome do sistema -->
            <h1 class="logo-title">
                GPAcademy
            </h1>

            <!-- Card de login -->
            <div class="login-card">

                <!-- Campo de email -->
                <label>
                    E-mail Institucional
                </label>

                <input type="email" id="email" placeholder="seu.nome@instituicao.edu.br">

                <p class="hint">
                    Utilize seu endereço de e-mail acadêmico oficial para acesso.
                </p>

                <!-- Campo de senha -->
                <label>
                    Senha
                </label>

                <input type="password" id="senha" placeholder="********">

                <div id="loginErro" class="login-erro" role="alert" hidden></div>

                <!-- Botão entrar -->
                <button onclick="entrar()" class="btn-primary">

                    Entrar

                </button>

            </div>

            <!-- Informação para novos usuários -->
            <p class="request-access">

                Novo na instituição?

                <span>
                    Procure a coordenação acadêmica ou o setor responsável da instituição para solicitar seu login no GPAcademy.
                </span>

            </p>

        </div>

    </section>

    <!-- JavaScript -->
    <script src="../js/config.js"></script>
    <script src="../js/responsive.js"></script>
    <script src="../js/login.js"></script>

</body>

</html>
