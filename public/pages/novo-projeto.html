<!DOCTYPE html>
<html lang="pt-br">

<head>

    <!-- Configurações básicas -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Novo Projeto</title>

    <!-- CSS da tela -->
    <link rel="stylesheet" href="../CSS/novo-projeto.css">
    <link rel="stylesheet" href="../CSS/responsive.css">

</head>

<body>

    <!-- CABEÇALHO -->
    <header class="header">

        <!-- Logo do sistema -->
        <div class="logo">
            GPAcademy
        </div>

        <!-- Menu -->
        <nav class="menu">
            <a href="dashboard-professor.html">
                Projetos
            </a>
        </nav>

        <button type="button" class="menu-toggle" onclick="toggleMenu()" aria-label="Abrir menu" aria-expanded="false">
            <span class="menu-toggle-bar"></span>
            <span class="menu-toggle-bar"></span>
            <span class="menu-toggle-bar"></span>
        </button>


        <!-- Área do usuário -->
        <div class="icons">

            <!-- Ícone de notificações -->
            <span>🔔</span>

            <div class="user-box">

                <div class="user-avatar">
                    👤
                </div>

                <div class="user-info">

                    <strong>
                        Usuário
                    </strong>

                    <span>
                        Professor
                    </span>

                </div>

            </div>

            <!-- Logout -->
            <button onclick="logout()" class="logout-btn">
                ⏻
            </button>

        </div>

    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="container">

        <!-- Voltar -->
        <button onclick="voltar()" class="back-btn">
            ← Voltar
        </button>

        <p class="mini-title">
            CRIAÇÃO | GESTÃO ACADÊMICA
        </p>

        <h1 class="title">
            Novo Projeto
        </h1>

        <!-- FORMULÁRIO -->
        <section class="form-box">

            <!-- Título -->
            <div class="input-group">

                <label>
                    Título do Projeto
                </label>

                <input type="text" id="titulo" placeholder="Ex: Sustentabilidade Urbana">

            </div>

            <!-- Descrição -->
            <div class="input-group">

                <label>
                    Descrição
                </label>

                <textarea id="descricao" placeholder="Descreva os objetivos do projeto...">
                </textarea>

            </div>

            <!-- Matéria -->
            <div class="input-group">

                <label>
                    Matéria / Disciplina
                </label>

                <input type="text" id="materia" placeholder="Ex: Banco de Dados">

            </div>

            <!-- Curso e período -->
            <div class="grid">

                <div class="input-group">

                    <label>
                        Curso
                    </label>

                    <select id="curso">
                        <option value="">
                            Carregando cursos...
                        </option>
                    </select>

                </div>

                <div class="input-group">

                    <label>
                        Período
                    </label>

                    <select id="periodo">
                        <option value="">
                            Selecione um curso primeiro
                        </option>
                    </select>

                </div>

            </div>

            <!-- Prazo -->
            <div class="input-group">

                <label>
                    Prazo de Entrega
                </label>

                <input type="date" id="prazo">

            </div>

            <!-- Tipo de entrega -->
            <div class="input-group">

                <label>
                    Tipo de Entrega
                </label>

                <div class="tipo-entrega">

                    <label>

                        <input
                            type="radio"
                            name="tipoEntrega"
                            value="individual"
                            checked
                            onchange="alterarTipoEntrega()">

                        Individual

                    </label>

                    <label>

                        <input
                            type="radio"
                            name="tipoEntrega"
                            value="grupo"
                            onchange="alterarTipoEntrega()">

                        Em Grupo

                    </label>

                </div>

            </div>

            <!-- Configuração dos grupos -->
            <div class="grupo-config" id="grupoConfig">

                <div class="grid">

                    <div class="input-group">

                        <label>
                            Quantidade de grupos
                        </label>

                        <input type="number" id="quantidadeGrupos" min="1" placeholder="Ex: 3" oninput="gerarGrupos()">

                    </div>

                    <div class="input-group">

                        <label>
                            Máximo de participantes
                        </label>

                        <input type="number" id="participantesGrupo" min="1" placeholder="Ex: 4">

                    </div>

                </div>

            </div>

            <!-- Lista dos grupos -->
            <div class="grupos-box" id="gruposBox">

                <h2>
                    Grupos do Projeto
                </h2>

                <div id="listaGrupos"></div>

            </div>

            <!-- Enviar para todos -->
            <div class="checkbox-area" id="checkboxTodos">

                <input type="checkbox" id="todosAlunos" checked>

                <label for="todosAlunos" class="checkbox-label">

                    Enviar para todos os alunos do período

                </label>

            </div>

            <!-- Mensagens de erro -->
            <p id="erroFormulario" class="erro-formulario">
            </p>

            <!-- Botões -->
            <div class="buttons">

                <button onclick="voltar()" class="btn-secondary">

                    Cancelar

                </button>

                <button onclick="publicarProjeto()" class="btn-primary">

                    Publicar Projeto

                </button>

            </div>

        </section>

    </main>

    <!-- MODAL DE SUCESSO -->
    <div class="success-modal" id="successModal">

        <div class="success-box">

            <div class="success-icon">
                ✓
            </div>

            <h3>
                Projeto Publicado!
            </h3>

            <p id="successMessage">
                Projeto publicado com sucesso!
            </p>

            <button onclick="fecharModalSucesso()">
                Voltar ao Dashboard
            </button>

        </div>

    </div>

    <!-- MODAL DE LOGOUT -->
    <div class="logout-modal" id="logoutModal">

        <div class="modal-box">

            <div class="modal-icon">
                ⏻
            </div>

            <h2>
                Encerrar Sessão
            </h2>

            <p>
                Deseja realmente encerrar sua sessão?
            </p>

            <div class="modal-buttons">

                <button onclick="confirmarLogout()" class="btn-danger">

                    Sim, sair

                </button>

                <button onclick="fecharModal()" class="btn-cancel">

                    Cancelar

                </button>

            </div>

        </div>

    </div>

    <!-- JavaScript -->    <script src="../js/config.js"></script>
    <script src="../js/responsive.js"></script>
    <script src="../js/novo-projeto.js"></script>

</body>

</html>
