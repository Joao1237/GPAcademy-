<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Upload do Projeto
    </title>

    <link rel="stylesheet" href="../CSS/upload-aluno.css">
    <link rel="stylesheet" href="../CSS/responsive.css">
</head>

<body>

    <header class="header">

        <div class="logo">
            GPAcademy
        </div>

        <nav class="menu">

            <a href="dashboard-aluno.html">
                Projetos
            </a>

        </nav>

        <button type="button" class="menu-toggle" onclick="toggleMenu()" aria-label="Abrir menu" aria-expanded="false">
            <span class="menu-toggle-bar"></span>
            <span class="menu-toggle-bar"></span>
            <span class="menu-toggle-bar"></span>
        </button>


        <div class="icons">

            <div class="notification-area">

                <button class="notification-btn" onclick="abrirNotificacoes()">
                    🔔
                    <span class="notification-count">0</span>
                </button>

                <div class="notification-box" id="notificationBox">
                    <h3>Notificações</h3>
                </div>

            </div>

            <div class="user-box">

                <div class="user-avatar">
                    👤
                </div>

                <div class="user-info">

                    <strong>
                        Usuário
                    </strong>

                    <span>
                        Aluno
                    </span>

                </div>

            </div>

            <button onclick="logout()" class="logout-btn">

                ⏻

            </button>

        </div>

    </header>

    <main class="container">

        <button onclick="voltar()" class="back-btn">

            ← Voltar

        </button>

        <h1 class="title">
            Análise de Termodinâmica Aplicada
        </h1>

        <section class="upload-box">

            <label>
                Upload do Trabalho
            </label>

            <div class="drop-area">

                <h2>
                    Arraste seus arquivos aqui
                </h2>

                <p>
                    ou clique para selecionar
                </p>

                <input type="file" id="arquivo" hidden>

                <button onclick="selecionarArquivo()" class="btn-secondary">

                    Selecionar Arquivo

                </button>

            </div>

            <div class="arquivo-info" id="arquivoInfo">

                <span id="nomeArquivo">
                    Nenhum arquivo selecionado
                </span>

            </div>

            <p id="erroUpload" class="erro-upload"></p>

            <div class="buttons">

                <button onclick="voltar()" class="btn-secondary">

                    Voltar

                </button>

                <button onclick="enviarProjeto()" class="btn-primary">

                    Confirmar Envio

                </button>

            </div>

        </section>

    </main>

    <!-- MODAL SUCESSO -->

    <div class="success-modal" id="successModal">

        <div class="success-box">

            <div class="success-icon">
                ✓
            </div>

            <h3>
                Trabalho enviado!
            </h3>

            <p>
                Seu arquivo foi enviado com sucesso.
            </p>

            <button onclick="fecharSucesso()">

                Voltar ao Dashboard

            </button>

        </div>

    </div>

    <!-- MODAL LOGOUT -->

    <div class="logout-modal" id="logoutModal">

        <div class="modal-box">

            <div class="modal-icon">
                ⏻
            </div>

            <h2>
                Encerrar Sessão
            </h2>

            <p>
                Deseja realmente encerrar sua sessão no GPAcademy?
            </p>

            <div class="modal-buttons">

                <button onclick="confirmarLogout()" class="btn-danger">

                    Sim, sair

                </button>

                <button onclick="fecharModal()" class="btn-cancel">

                    Cancelar

                </button>

            </div>

        </div>

    <script src="../js/config.js"></script>
    <script src="../js/responsive.js"></script>
    <script src="../js/notificacoes.js"></script>
    <script src="../js/upload-aluno.js"></script>

</body>

</html>
